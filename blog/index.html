---
layout: null
---
<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>重ね描き日記</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: #ffffff;
      color: #0d0d0d;
      line-height: 1.7;
      padding: 60px 20px;
    }
    .container { max-width: 640px; margin: 0 auto; }
    header { margin-bottom: 48px; }
    header a { text-decoration: none; color: #0d0d0d; }
    header h1 { font-size: 22px; font-weight: 700; margin-bottom: 4px; }
    header p { font-size: 13px; color: #666; }
    .back { font-size: 13px; color: #999; margin-bottom: 24px; display: block; text-decoration: none; }
    .back:hover { color: #cc2b2b; }
    .post-list { list-style: none; }
    .post-item { border-bottom: 1px solid #f0f0f0; padding: 16px 0; }
    .post-item a { text-decoration: none; color: #0d0d0d; }
    .post-item a:hover h2 { color: #cc2b2b; }
    .post-item h2 { font-size: 15px; font-weight: 600; margin-bottom: 4px; }
    .post-meta { font-size: 12px; color: #999; }
    .post-tags { margin-left: 8px; }
    .post-tag { background: #f5f5f5; padding: 2px 6px; border-radius: 3px; margin-left: 4px; font-size: 11px; }
    footer { margin-top: 48px; padding-top: 24px; border-top: 1px solid #e0e0e0; font-size: 12px; color: #999; text-align: center; }
  </style>
</head>
<body>
  <div class="container">
    <a class="back" href="/">← プロフィールに戻る</a>
    <header>
      <h1>重ね描き日記</h1>
      <p>読書メモ、探究メモなど。2015年〜</p>
    </header>

    <ul class="post-list">
      {% for post in site.posts %}
      <li class="post-item">
        <a href="{{ post.url }}">
          <h2>{{ post.title }}</h2>
          <div class="post-meta">
            {{ post.date | date: "%Y年%m月%d日" }}
            {% if post.tags %}
            <span class="post-tags">
              {% for tag in post.tags %}
              <span class="post-tag">{{ tag }}</span>
              {% endfor %}
            </span>
            {% endif %}
          </div>
        </a>
      </li>
      {% endfor %}
    </ul>

    <footer>© Ryuichi Maruyama</footer>
  </div>
</body>
</html>
