---
layout: null
---
<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Xアーカイブ - rmaruy</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: #ffffff;
      color: #0d0d0d;
      line-height: 1.7;
      padding: 60px 20px;
    }
    .container { max-width: 640px; margin: 0 auto; }
    .back { font-size: 13px; color: #999; margin-bottom: 24px; display: block; text-decoration: none; }
    .back:hover { color: #cc2b2b; }
    header { margin-bottom: 32px; }
    header h1 { font-size: 22px; font-weight: 700; margin-bottom: 4px; }
    header p { font-size: 13px; color: #666; }

    .search-box {
      width: 100%;
      padding: 10px 14px;
      font-size: 14px;
      font-family: inherit;
      border: 1.5px solid #e0e0e0;
      border-radius: 6px;
      outline: none;
      margin-bottom: 16px;
      transition: border-color 0.15s;
    }
    .search-box:focus { border-color: #cc2b2b; }

    .year-filter { margin-bottom: 24px; }
    .year-filter-label { font-size: 11px; color: #999; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; }
    .year-cloud { display: flex; flex-wrap: wrap; gap: 6px; }
    .year-btn {
      background: #f5f5f5;
      border: 1px solid transparent;
      padding: 3px 8px;
      border-radius: 4px;
      font-size: 11px;
      font-family: inherit;
      cursor: pointer;
      color: #444;
      transition: all 0.15s;
    }
    .year-btn:hover { background: #eee; }
    .year-btn.active { background: #cc2b2b; color: #fff; border-color: #cc2b2b; }

    .result-count { font-size: 12px; color: #999; margin-bottom: 12px; min-height: 18px; }

    .tweet-list { list-style: none; }
    .tweet-item {
      border-bottom: 1px solid #f0f0f0;
      padding: 14px 0;
    }
    .tweet-item.hidden { display: none; }
    .tweet-text { font-size: 14px; line-height: 1.75; margin-bottom: 6px; white-space: pre-wrap; word-break: break-word; }
    .tweet-meta { font-size: 12px; color: #aaa; display: flex; gap: 12px; }
    .tweet-meta a { color: #bbb; text-decoration: none; }
    .tweet-meta a:hover { color: #cc2b2b; }

    .no-results { padding: 32px 0; text-align: center; font-size: 14px; color: #999; display: none; }
    .loading { padding: 32px 0; text-align: center; font-size: 14px; color: #999; }

    footer { margin-top: 48px; padding-top: 24px; border-top: 1px solid #e0e0e0; font-size: 12px; color: #999; text-align: center; }
  </style>
</head>
<body>
  <div class="container">
    <a class="back" href="/">← プロフィールに戻る</a>
    <header>
      <h1>Xアーカイブ</h1>
      <p id="header-desc">@rmaruy のポスト一覧</p>
    </header>

    <input class="search-box" id="search" type="text" placeholder="検索...">

    <div class="year-filter">
      <div class="year-filter-label">年で絞り込む</div>
      <div class="year-cloud" id="year-cloud"></div>
    </div>

    <div class="result-count" id="result-count"></div>

    <div class="loading" id="loading">読み込み中...</div>
    <ul class="tweet-list" id="tweet-list"></ul>
    <div class="no-results" id="no-results">該当するポストが見つかりませんでした</div>

    <footer>© Ryuichi Maruyama</footer>
  </div>

  <script>
    const searchInput  = document.getElementById('search');
    const tweetList    = document.getElementById('tweet-list');
    const yearCloud    = document.getElementById('year-cloud');
    const resultCount  = document.getElementById('result-count');
    const noResults    = document.getElementById('no-results');
    const loadingEl    = document.getElementById('loading');
    const headerDesc   = document.getElementById('header-desc');

    let allTweets = [];
    let activeYear = '';

    // URLのリンク化
    function linkify(text) {
      return text
        .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
        .replace(/(https?:\/\/[^\s]+)/g, '<a href="$1" target="_blank" rel="noopener">$1</a>')
        .replace(/@(\w+)/g, '<a href="https://x.com/$1" target="_blank" rel="noopener">@$1</a>');
    }

    function renderTweets(tweets) {
      tweetList.innerHTML = '';
      tweets.forEach(t => {
        const li = document.createElement('li');
        li.className = 'tweet-item';
        li.dataset.text = t.text.toLowerCase();
        li.dataset.year = t.date ? t.date.slice(0, 4) : '';
        li.innerHTML = `
          <div class="tweet-text">${linkify(t.text)}</div>
          <div class="tweet-meta">
            <span>${t.date || ''}</span>
            <a href="${t.url}" target="_blank" rel="noopener">X で見る →</a>
          </div>`;
        tweetList.appendChild(li);
      });
    }

    function buildYearButtons(tweets) {
      const years = [...new Set(tweets.map(t => t.date ? t.date.slice(0,4) : '').filter(Boolean))].sort().reverse();
      yearCloud.innerHTML = '<button class="year-btn active" data-year="">all</button>';
      years.forEach(y => {
        const btn = document.createElement('button');
        btn.className = 'year-btn';
        btn.dataset.year = y;
        btn.textContent = y;
        yearCloud.appendChild(btn);
      });
      yearCloud.querySelectorAll('.year-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          activeYear = activeYear === btn.dataset.year ? '' : btn.dataset.year;
          yearCloud.querySelectorAll('.year-btn').forEach(b => {
            b.classList.toggle('active', b.dataset.year === activeYear || (activeYear === '' && b.dataset.year === ''));
          });
          applyFilter();
        });
      });
    }

    function applyFilter() {
      const query = searchInput.value.trim().toLowerCase();
      const items = tweetList.querySelectorAll('.tweet-item');
      let visible = 0;
      items.forEach(item => {
        const textOk = !query || item.dataset.text.includes(query);
        const yearOk = !activeYear || item.dataset.year === activeYear;
        if (textOk && yearOk) {
          item.classList.remove('hidden');
          visible++;
        } else {
          item.classList.add('hidden');
        }
      });
      if (query || activeYear) {
        resultCount.textContent = visible + ' 件';
      } else {
        resultCount.textContent = '';
      }
      noResults.style.display = visible === 0 ? 'block' : 'none';
    }

    searchInput.addEventListener('input', applyFilter);

    // データ読み込み
    fetch('./data.json')
      .then(r => {
        if (!r.ok) throw new Error('data.json not found');
        return r.json();
      })
      .then(data => {
        allTweets = data;
        loadingEl.style.display = 'none';
        headerDesc.textContent = `@rmaruy のポスト ${data.length.toLocaleString()} 件`;
        renderTweets(data);
        buildYearButtons(data);
      })
      .catch(() => {
        loadingEl.textContent = 'データがまだ準備されていません。parse_tweets.py を実行してください。';
      });
  </script>
</body>
</html>
